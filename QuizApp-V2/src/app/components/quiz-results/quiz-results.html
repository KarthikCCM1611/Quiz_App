@if (quizResult() !== null) {
<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100" style="font-family: 'Inter', sans-serif">
    <div class="container mx-auto px-4 py-8">

        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-teal-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-trophy text-white"></i>
                </div>
                <span class="text-xl font-bold text-slate-800">QuizMaster</span>
            </div>
        </div>

        <div class="max-w-2xl mx-auto">

            <!-- Score Card -->
            <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12 text-center mb-6">

                <!-- Circular Progress -->
                <div class="w-32 h-32 mx-auto mb-6 relative">
                    <svg class="w-full h-full -rotate-90" viewBox="0 0 120 120">

                        <circle cx="60" cy="60" r="54" stroke="#e2e8f0" stroke-width="12" fill="none" />

                        <circle cx="60" cy="60" r="54" stroke="url(#gradient)" stroke-width="12" fill="none"
                            stroke-linecap="round" [attr.stroke-dasharray]="(getScorePercentage() * 3.39) + ' 339'" />

                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#0d9488" />
                                <stop offset="100%" stop-color="#06b6d4" />
                            </linearGradient>
                        </defs>

                    </svg>

                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="text-4xl font-bold text-slate-800">
                            {{ getScorePercentage() }}%
                        </span>
                    </div>
                </div>

                <!-- Message -->
                <h2 class="text-3xl font-bold mb-2" [ngClass]="getMessage().color">
                    {{ getMessage().text }}
                </h2>

                <p class="text-slate-500 mb-8">You completed the quiz</p>

                <!-- Stats -->
                <div class="grid grid-cols-3 gap-4 mb-8">

                    <div class="bg-slate-50 rounded-xl p-4">
                        <div class="text-3xl font-bold text-slate-800">
                            {{ quizResult()?.questions?.length }}
                        </div>
                        <div class="text-sm text-slate-500">Total</div>
                    </div>

                    <div class="bg-emerald-50 rounded-xl p-4">
                        <div class="text-3xl font-bold text-emerald-600">
                            {{ calculateScore() }}
                        </div>
                        <div class="text-sm text-emerald-600">Correct</div>
                    </div>

                    <div class="bg-red-50 rounded-xl p-4">
                        <div class="text-3xl font-bold text-red-500">
                            {{ quizResult()?.questions?.length ?? 0 - calculateScore() }}
                        </div>
                        <div class="text-sm text-red-500">Incorrect</div>
                    </div>

                </div>

                <!-- Actions -->
                <div class="flex flex-col sm:flex-row gap-3">

                    <button (click)="onSetView('review')"
                        class="flex-1 py-3 px-6 bg-slate-100 text-slate-700 rounded-xl hover:bg-slate-200 transition-all font-medium">
                        Review Answers
                    </button>

                    <button (click)="onResetQuiz()"
                        class="flex-1 py-3 px-6 bg-gradient-to-r from-teal-600 to-cyan-600 text-white rounded-xl hover:from-teal-700 hover:to-cyan-700 transition-all font-semibold">
                        Try Again
                    </button>

                </div>

            </div>
        </div>

    </div>
</div>
}
