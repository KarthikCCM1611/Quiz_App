<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100" style="font-family: 'Inter', sans-serif">

    <div class="container mx-auto px-4 py-8">

        <!-- Header -->
        <div class="flex items-center justify-between mb-12">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-teal-600 rounded-xl flex items-center justify-center">
                    <i class="fas fa-trophy text-white text-sm"></i>
                </div>
                <span class="text-xl font-bold text-slate-800">QuizMaster</span>
            </div>
        </div>

        <!-- Main Card -->
        <div class="max-w-2xl mx-auto">
            <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12 text-center">

                <div
                    class="w-20 h-20 bg-gradient-to-br from-teal-500 to-cyan-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
                    <i class="fas fa-trophy text-white text-xl"></i>
                </div>

                <h1 class="text-3xl md:text-4xl font-bold text-slate-800 mb-4">
                    Ready to Test Your Knowledge?
                </h1>

                <p class="text-slate-500 text-lg mb-8">
                    Select the number of questions to begin your quiz adventure
                </p>

                <!-- Dropdown -->
                <div class="mb-8">
                    <label class="block text-sm font-medium text-slate-700 mb-3">
                        Number of Questions
                    </label>

                    <div class="relative inline-block w-full max-w-xs">

                        <select
                            class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-200 rounded-xl text-lg font-medium text-slate-700"
                            [value]="questionCount || ''" (change)="setQuestionCount($event)">
                            <option value="" disabled>Select number...</option>
                            <option value="2">2 Questions</option>
                            <option value="5">5 Questions</option>
                            <option value="10">10 Questions</option>
                            <option value="15">15 Questions</option>
                            <option value="20">20 Questions</option>
                            <option value="25">25 Questions</option>
                        </select>

                    </div>
                </div>

                <!-- Start Button -->
                <button (click)="startQuizz()" [disabled]="!questionCount()"
                    class="w-full max-w-xs py-4 bg-gradient-to-r from-teal-600 to-cyan-600 text-white font-semibold text-lg rounded-xl disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-lg">
                    Start Quiz
                    <i class="fas fa-chevron-right"></i>
                </button>

            </div>
        </div>

    </div>
</div>
